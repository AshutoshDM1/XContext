name: Deploy Backend (DO VM)

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy.yaml"
  workflow_dispatch: {}

concurrency:
  group: deploy-backend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: SSH deploy backend
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: ${{ secrets.DO_SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail

            # GitHub Action uses a non-login shell; ensure Bun is on PATH.
            export PATH="$HOME/.bun/bin:/usr/local/bin:/usr/bin:/bin:$PATH"
            if ! command -v bun >/dev/null 2>&1; then
              echo "bun not found on PATH. HOME=$HOME"
              ls -la "$HOME/.bun/bin" || true
              exit 127
            fi
            bun -v

            cd "$HOME/XContext/backend"

            git stash push -u -m "ci-deploy-$(date -u +%Y%m%dT%H%M%SZ)" || true
            git fetch origin main
            git pull --ff-only origin main

            bun install --frozen-lockfile
            bun run build

            pm2 restart xcontext-backend --update-env
            pm2 save
