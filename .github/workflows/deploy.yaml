name: Deploy Backend (DO VM)

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy.yaml'
  workflow_dispatch: {}

concurrency:
  group: deploy-backend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: SSH deploy backend
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: ${{ secrets.DO_SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail

            # GitHub Action uses a non-login shell; ensure Bun is on PATH.
            export PATH="$HOME/.bun/bin:/usr/local/bin:/usr/bin:/bin:$PATH"
            if ! command -v bun >/dev/null 2>&1; then
              echo "bun not found on PATH. HOME=$HOME"
              ls -la "$HOME/.bun/bin" || true
              exit 127
            fi
            bun -v

            cd "$HOME/XContext/backend"

            git stash push -u -m "ci-deploy-$(date -u +%Y%m%dT%H%M%SZ)" || true
            git fetch origin main
            git pull --ff-only origin main

            bun install --frozen-lockfile
            bun run build

            # Ensure Node/PM2 are on PATH (common setups: nvm, global npm, system)
            export PATH="$HOME/.bun/bin:/usr/local/bin:/usr/bin:/bin:$PATH"

            # Load nvm if present (PM2 is often installed there)
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            [ -s "$NVM_DIR/bash_completion" ] && . "$NVM_DIR/bash_completion"
            # nvm use --lts || true

            if ! command -v pm2 >/dev/null 2>&1; then
              echo "pm2 not found on PATH. PATH=$PATH"
              exit 127
            fi
            pm2 -v

            pm2 restart 10
            pm2 save
